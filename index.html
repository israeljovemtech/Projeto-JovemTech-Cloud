<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Olá, Nuvem</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui;
        background: #0f172a;
        color: white;
      }

      main {
        text-align: center;
      }

      input {
        padding: 10px;
        margin: 20px;
      }

      button {
        padding: 12px 22px;
        margin: 5px;
        cursor: pointer;
      }

      #status {
        margin-top: 20px;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Olá, Nuvem</h1>

      <input id="nome" placeholder="Digite seu nome" />

      <br />

      <button onclick="buscarHora()">Ver Hora</button>

      <button onclick="buscarSorteio()">Sortear Número</button>

      <p id="status">Clique em um botão.</p>
    </main>

    <script>
      const URL_DO_WORKER =
        "https://worker-cloud-api.israeljovemtech.workers.dev/";

      async function buscarHora() {
        const status = document.getElementById("status");

        const nome = document.getElementById("nome").value;

        status.textContent = "Buscando...";

        try {
          const resposta = await fetch(
            URL_DO_WORKER + "hora?nome=" + encodeURIComponent(nome),
          );

          // NOVO
          if (!resposta.ok) {
            status.textContent = "❌ A rota solicitada não foi encontrada.";

            return;
          }

          const dados = await resposta.json();

          status.innerHTML = `<strong>${dados.mensagem}</strong><br><br>
Hora: ${dados.horaDoServidor}<br>
Frase: ${dados.fraseDoDia}`;
        } catch {
          status.textContent = "⚠ Não foi possível conectar ao Worker.";
        }
      }

      async function buscarSorteio() {
        const status = document.getElementById("status");

        status.textContent = "Sorteando...";

        try {
          const resposta = await fetch(URL_DO_WORKER + "sorteio");

          // NOVO
          if (!resposta.ok) {
            status.textContent = "❌ A rota solicitada não foi encontrada.";

            return;
          }

          const dados = await resposta.json();

          status.innerHTML = `Número sorteado: <strong>${dados.numero}</strong>`;
        } catch {
          status.textContent = "⚠ Não foi possível conectar ao Worker.";
        }
      }
    </script>
  </body>
</html>
